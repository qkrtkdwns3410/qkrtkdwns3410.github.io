<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="200" fill="url(#bg)"/>

  <!-- Terminal window -->
  <rect x="80" y="100" width="240" height="180" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="80" y="100" width="240" height="32" rx="12" fill="#1e293b"/>
  <rect x="80" y="120" width="240" height="12" fill="#1e293b"/>
  <circle cx="100" cy="116" r="5" fill="#ef4444"/>
  <circle cx="116" cy="116" r="5" fill="#eab308"/>
  <circle cx="132" cy="116" r="5" fill="#22c55e"/>

  <!-- Code lines -->
  <!-- Line 1: const -->
  <rect x="100" y="148" width="36" height="8" rx="2" fill="#c084fc" opacity="0.9"/>
  <rect x="142" y="148" width="52" height="8" rx="2" fill="#f8fafc" opacity="0.7"/>
  <rect x="200" y="148" width="12" height="8" rx="2" fill="#fbbf24" opacity="0.8"/>
  <rect x="218" y="148" width="68" height="8" rx="2" fill="url(#green)" opacity="0.8"/>

  <!-- Line 2: function -->
  <rect x="100" y="168" width="48" height="8" rx="2" fill="#c084fc" opacity="0.9"/>
  <rect x="154" y="168" width="44" height="8" rx="2" fill="url(#accent)" opacity="0.9"/>
  <rect x="204" y="168" width="16" height="8" rx="2" fill="#fbbf24" opacity="0.7"/>
  <rect x="226" y="168" width="8" height="8" rx="2" fill="#f8fafc" opacity="0.5"/>

  <!-- Line 3: indented -->
  <rect x="116" y="188" width="28" height="8" rx="2" fill="#fb923c" opacity="0.8"/>
  <rect x="150" y="188" width="60" height="8" rx="2" fill="#f8fafc" opacity="0.5"/>
  <rect x="216" y="188" width="40" height="8" rx="2" fill="url(#green)" opacity="0.7"/>

  <!-- Line 4: return -->
  <rect x="116" y="208" width="40" height="8" rx="2" fill="#c084fc" opacity="0.9"/>
  <rect x="162" y="208" width="72" height="8" rx="2" fill="url(#accent)" opacity="0.7"/>

  <!-- Line 5: closing -->
  <rect x="100" y="228" width="8" height="8" rx="2" fill="#fbbf24" opacity="0.7"/>

  <!-- Cursor blink -->
  <rect x="100" y="248" width="8" height="12" rx="1" fill="url(#accent)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Prompt symbol -->
  <text x="100" y="258" font-family="monospace" font-size="14" fill="url(#green)" opacity="0.8">$</text>

  <!-- Decorative dots -->
  <circle cx="340" cy="80" r="3" fill="url(#accent)" opacity="0.4"/>
  <circle cx="60" cy="320" r="4" fill="url(#green)" opacity="0.3"/>
  <circle cx="350" cy="300" r="2" fill="#c084fc" opacity="0.5"/>
</svg>
